<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLM Gateway · 路由控制台</title>
<style>
  :root {
    --ink: #0c0f14; --panel: #12161d; --panel-2: #161b24;
    --line: #232a35; --line-soft: #1b212b;
    --text: #e6edf3; --muted: #8c97a6; --faint: #5d6675;
    --accent: #34d399; --accent-dim: #1f6b52;
    --danger: #f8717110; --danger-text: #fb7185; --warn: #fbbf24;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 80% -10%, #14361f22, transparent 60%), var(--ink);
    color: var(--text); font-family: var(--sans); line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  .wrap { max-width: 920px; margin: 0 auto; padding: 28px 20px 80px; }
  header.top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  header.top h1 { font-size: 19px; font-weight: 650; letter-spacing: .2px; margin: 0; font-family: var(--mono); }
  header.top h1 .slash { color: var(--accent); }
  header.top .sub { color: var(--faint); font-size: 12.5px; font-family: var(--mono); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); display: inline-block; }
  .dot.live { background: var(--accent); box-shadow: 0 0 0 3px #34d39922; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-top: 18px; }
  .card > h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); margin: 0 0 14px; font-weight: 600; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 5px; }
  input, textarea, select {
    width: 100%; background: var(--ink); color: var(--text); border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; font-size: 13.5px; font-family: var(--mono); transition: border-color .12s;
  }
  textarea { resize: vertical; min-height: 64px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px #34d39920; }
  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 160px; }
  button {
    font-family: var(--sans); font-size: 13px; font-weight: 550; border-radius: 8px; padding: 9px 16px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    transition: background .12s, border-color .12s, transform .04s;
  }
  button:hover { border-color: #33404f; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: #06130d; border-color: var(--accent); }
  button.primary:hover { background: #41e0a6; }
  button.ghost { background: transparent; }
  button.mini { padding: 5px 10px; font-size: 12px; font-family: var(--mono); }
  button.link { background: none; border: none; color: var(--danger-text); padding: 6px 8px; }
  button.link:hover { background: var(--danger); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .ep { border: 1px solid var(--line-soft); border-radius: 10px; padding: 14px; margin-bottom: 12px; background: var(--panel-2); border-left: 3px solid var(--accent-dim); }
  .ep .ep-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ep .ep-head .map { font-family: var(--mono); font-size: 12.5px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; }
  .ep .ep-head .map b { color: var(--accent); font-weight: 600; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 12px; } .field:last-child { margin-bottom: 0; }
  .hint { color: var(--faint); font-size: 11.5px; margin-top: 4px; font-family: var(--mono); }
  .ep-foot { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line-soft); }
  .ep-stats { font-family: var(--mono); font-size: 11.5px; color: var(--faint); }
  .ep-stats b { color: var(--text); font-weight: 600; }
  .ep-stats .ok { color: var(--accent); } .ep-stats .err { color: var(--danger-text); }
  .ping-res { font-family: var(--mono); font-size: 11.5px; }
  .ping-res.ok { color: var(--accent); } .ping-res.err { color: var(--danger-text); } .ping-res.wait { color: var(--warn); }
  .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .spacer { flex: 1; }
  pre { background: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; color: var(--muted); margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; }
  pre .k { color: var(--accent); }
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 11px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 50; font-family: var(--mono); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--accent-dim); } .toast.err { border-color: #5c2530; color: var(--danger-text); }
  .empty { color: var(--faint); font-size: 13px; text-align: center; padding: 26px 0; font-family: var(--mono); }
  .locked { opacity: .4; pointer-events: none; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>llm<span class="slash">/</span>gateway</h1>
    <span class="sub" id="originLabel"></span>
    <span class="spacer"></span>
    <span class="sub"><span class="dot" id="connDot"></span> <span id="connText">未连接</span></span>
  </header>

  <section class="card">
    <h2>连接控制台</h2>
    <div class="row">
      <div>
        <label>管理员令牌（ADMIN_TOKEN）</label>
        <input id="adminToken" type="password" placeholder="输入后台环境变量里设的 ADMIN_TOKEN" />
      </div>
      <button class="primary" id="connectBtn">连接并载入</button>
    </div>
    <div class="hint">令牌只用于读写配置，保存在本浏览器，不会出现在地址栏或日志里。</div>
  </section>

  <section class="card" id="cfgCard">
    <h2>上游站点</h2>
    <div class="toolbar">
      <button class="mini ghost" id="refreshStatsBtn">刷新统计</button>
      <button class="mini ghost" id="resetStatsBtn">清零统计</button>
    </div>
    <div id="epList"></div>
    <div class="bar">
      <button class="ghost" id="addBtn">+ 新增站点</button>
      <span class="spacer"></span>
      <button class="primary" id="saveBtn" disabled>保存配置</button>
    </div>
  </section>

  <section class="card">
    <h2>对外 OpenAI 兼容接口</h2>
    <div class="field">
      <label>Base URL（给别的工具 / OpenAI SDK 用）</label>
      <pre id="baseUrlBox">—</pre>
    </div>
    <div class="field">
      <label>调用示例（鉴权用 PROXY_API_KEY，model 写「站点名/模型名」）</label>
      <pre id="curlBox">—</pre>
    </div>
    <div class="hint">PROXY_API_KEY 是后台环境变量，单独设置；各上游 key 只存在服务端，不会下发到调用方。</div>
  </section>

  <section class="card">
    <h2>调用测试</h2>
    <div class="row" style="margin-bottom:12px;">
      <div>
        <label>PROXY_API_KEY</label>
        <input id="proxyKey" type="password" placeholder="后台设的 PROXY_API_KEY" />
      </div>
      <div>
        <label>模型（站点名/模型名）</label>
        <input id="testModel" list="modelList" placeholder="openai/gpt-4o" />
        <datalist id="modelList"></datalist>
      </div>
    </div>
    <div class="field">
      <label>消息</label>
      <textarea id="testMsg" placeholder="hello">hello</textarea>
    </div>
    <div class="bar">
      <button class="primary" id="testBtn">发送</button>
      <span class="spacer"></span>
    </div>
    <pre id="testOut" style="display:none;"></pre>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const origin = location.origin;
  const $ = (id) => document.getElementById(id);
  $("originLabel").textContent = origin;

  const LS = {
    get a() { return localStorage.getItem("llmgw_admin") || ""; },
    set a(v) { localStorage.setItem("llmgw_admin", v); },
    get p() { return localStorage.getItem("llmgw_proxy") || ""; },
    set p(v) { localStorage.setItem("llmgw_proxy", v); },
  };
  $("adminToken").value = LS.a;
  $("proxyKey").value = LS.p;

  let endpoints = [];
  let stats = {};
  let connected = false;

  let toastTimer;
  function toast(msg, kind = "ok") {
    const t = $("toast"); t.textContent = msg; t.className = "toast show " + kind;
    clearTimeout(toastTimer); toastTimer = setTimeout(() => (t.className = "toast " + kind), 2600);
  }
  function adminHeaders(extra) { return Object.assign({ "X-Admin-Token": $("adminToken").value.trim() }, extra || {}); }

  function setConn(ok) {
    connected = ok;
    $("connDot").className = "dot" + (ok ? " live" : "");
    $("connText").textContent = ok ? "已连接" : "未连接";
    $("saveBtn").disabled = !ok;
    $("cfgCard").classList.toggle("locked", !ok);
  }
  setConn(false);

  function statLine(name) {
    const s = stats[name];
    if (!s || !s.total) return "尚无调用";
    const last = s.lastUsed ? new Date(s.lastUsed).toLocaleString() : "—";
    return `调用 <b>${s.total}</b> · <span class="ok">ok ${s.ok}</span> · <span class="err">err ${s.err}</span> · 最近 ${last}`;
  }

  function render() {
    const list = $("epList");
    list.innerHTML = "";
    if (!endpoints.length) list.innerHTML = '<div class="empty">还没有站点。点下方「新增站点」开始。</div>';

    endpoints.forEach((ep, idx) => {
      const el = document.createElement("div");
      el.className = "ep";
      el.innerHTML = `
        <div class="ep-head">
          <div class="map"><b>${escapeHtml(ep.name || "未命名")}</b>/&lt;model&gt; &rarr; ${escapeHtml(ep.baseUrl || "…")}</div>
          <button class="link" data-del="${idx}">删除</button>
        </div>
        <div class="grid2">
          <div class="field">
            <label>站点名（调用前缀，不能含 /）</label>
            <input data-f="name" data-i="${idx}" value="${escapeAttr(ep.name)}" placeholder="freeapi" />
          </div>
          <div class="field">
            <label>Base URL（OpenAI 兼容根，通常以 /v1 结尾）</label>
            <input data-f="baseUrl" data-i="${idx}" value="${escapeAttr(ep.baseUrl)}" placeholder="https://xxx/v1" />
          </div>
        </div>
        <div class="field">
          <label>API Keys（每行一个，多个会随机轮换）</label>
          <textarea data-f="apiKeys" data-i="${idx}" placeholder="sk-...">${escapeHtml((ep.apiKeys || []).join("\n"))}</textarea>
        </div>
        <div class="field">
          <label>模型（每行一个，可留空；填了 /v1/models 会列出来）</label>
          <textarea data-f="models" data-i="${idx}" placeholder="gpt-4o">${escapeHtml((ep.models || []).join("\n"))}</textarea>
        </div>
        <div class="ep-foot">
          <button class="mini ghost" data-ping="${idx}">测试连通</button>
          <span class="ping-res" data-pingres="${idx}"></span>
          <span class="spacer"></span>
          <span class="ep-stats" data-stat="${idx}">${statLine(ep.name)}</span>
        </div>`;
      list.appendChild(el);
    });

    list.querySelectorAll("[data-f]").forEach((node) => {
      node.addEventListener("input", (e) => {
        const i = +e.target.dataset.i, f = e.target.dataset.f;
        if (f === "apiKeys" || f === "models") endpoints[i][f] = e.target.value.split("\n").map((s) => s.trim()).filter(Boolean);
        else endpoints[i][f] = e.target.value;
        if (f === "name" || f === "baseUrl") {
          const head = e.target.closest(".ep").querySelector(".map");
          head.innerHTML = `<b>${escapeHtml(endpoints[i].name || "未命名")}</b>/&lt;model&gt; &rarr; ${escapeHtml(endpoints[i].baseUrl || "…")}`;
        }
        if (f === "name") e.target.closest(".ep").querySelector(".ep-stats").innerHTML = statLine(endpoints[i].name);
      });
    });
    list.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => { endpoints.splice(+b.dataset.del, 1); render(); }));
    list.querySelectorAll("[data-ping]").forEach((b) => b.addEventListener("click", () => pingEndpoint(+b.dataset.ping)));
    refreshUsage();
  }

  function refreshUsage() {
    $("baseUrlBox").innerHTML = `${escapeHtml(origin)}/v1`;
    const sample = endpoints[0];
    const m = sample ? `${sample.name}/${(sample.models && sample.models[0]) || "MODEL"}` : "openai/gpt-4o";
    $("curlBox").innerHTML =
`curl -X POST ${escapeHtml(origin)}/v1/chat/completions \\
  -H "Authorization: Bearer <span class="k">$PROXY_API_KEY</span>" \\
  -H "Content-Type: application/json" \\
  -d '{"model":"${escapeHtml(m)}","messages":[{"role":"user","content":"hello"}]}'`;
    const dl = $("modelList"); dl.innerHTML = "";
    endpoints.forEach((ep) => (ep.models || []).forEach((mm) => {
      const o = document.createElement("option"); o.value = `${ep.name}/${mm}`; dl.appendChild(o);
    }));
  }

  async function loadStats() {
    try {
      const r = await fetch("/admin/stats", { headers: adminHeaders() });
      const data = await r.json();
      if (r.ok) stats = data.stats || {};
    } catch {}
  }

  async function connect() {
    const token = $("adminToken").value.trim();
    if (!token) return toast("先填管理员令牌", "err");
    LS.a = token;
    try {
      const r = await fetch("/admin/config", { headers: adminHeaders() });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || r.status);
      endpoints = (data.endpoints || []).map((e) => ({ name: e.name || "", baseUrl: e.baseUrl || "", apiKeys: e.apiKeys || [], models: e.models || [] }));
      await loadStats();
      setConn(true); render();
      toast("已载入 " + endpoints.length + " 个站点", "ok");
    } catch (err) { setConn(false); toast("连接失败：" + err.message, "err"); }
  }

  async function save() {
    try {
      const r = await fetch("/admin/config", { method: "PUT", headers: adminHeaders({ "Content-Type": "application/json" }), body: JSON.stringify({ endpoints }) });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || r.status);
      endpoints = data.endpoints || []; render(); toast("已保存", "ok");
    } catch (err) { toast("保存失败：" + err.message, "err"); }
  }

  async function refreshStats() {
    if (!connected) return toast("先连接控制台", "err");
    await loadStats();
    document.querySelectorAll("[data-stat]").forEach((el, i) => { el.innerHTML = statLine(endpoints[i] && endpoints[i].name); });
    toast("统计已刷新", "ok");
  }

  async function resetStats() {
    if (!connected) return toast("先连接控制台", "err");
    if (!confirm("确定清零所有站点的请求计数？")) return;
    try {
      const r = await fetch("/admin/stats", { method: "DELETE", headers: adminHeaders() });
      if (!r.ok) throw new Error((await r.json()).error || r.status);
      stats = {}; render(); toast("计数已清零", "ok");
    } catch (err) { toast("清零失败：" + err.message, "err"); }
  }

  async function pingEndpoint(idx) {
    const ep = endpoints[idx];
    const res = document.querySelector(`[data-pingres="${idx}"]`);
    if (!ep.baseUrl) { res.className = "ping-res err"; res.textContent = "✗ 先填 Base URL"; return; }
    res.className = "ping-res wait"; res.textContent = "测试中…";
    try {
      const r = await fetch("/admin/ping", {
        method: "POST", headers: adminHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ baseUrl: ep.baseUrl, apiKey: (ep.apiKeys || [])[0] || "" }),
      });
      const d = await r.json();
      if (d.ok) { res.className = "ping-res ok"; res.textContent = `✓ ${d.status} · ${d.ms}ms`; }
      else { res.className = "ping-res err"; res.textContent = d.status ? `✗ ${d.status} · ${d.ms}ms` : `✗ ${d.error || "失败"}`; }
    } catch (err) { res.className = "ping-res err"; res.textContent = "✗ " + err.message; }
  }

  async function test() {
    const key = $("proxyKey").value.trim();
    const model = $("testModel").value.trim();
    const msg = $("testMsg").value;
    if (!key) return toast("填 PROXY_API_KEY", "err");
    if (!model.includes("/")) return toast("model 要写成 站点名/模型名", "err");
    LS.p = key;
    const out = $("testOut"); out.style.display = "block"; out.textContent = "请求中…";
    try {
      const r = await fetch("/v1/chat/completions", {
        method: "POST", headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
        body: JSON.stringify({ model, messages: [{ role: "user", content: msg }], stream: false }),
      });
      const data = await r.json();
      if (!r.ok) { out.textContent = "HTTP " + r.status + "\n" + JSON.stringify(data, null, 2); return; }
      const content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      out.textContent = content != null ? content : JSON.stringify(data, null, 2);
    } catch (err) { out.textContent = "请求出错：" + err.message; }
  }

  function escapeHtml(s) { return String(s == null ? "" : s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
  function escapeAttr(s) { return String(s == null ? "" : s).replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

  $("connectBtn").addEventListener("click", connect);
  $("addBtn").addEventListener("click", () => { if (!connected) return toast("先连接控制台", "err"); endpoints.push({ name: "", baseUrl: "", apiKeys: [], models: [] }); render(); });
  $("saveBtn").addEventListener("click", save);
  $("refreshStatsBtn").addEventListener("click", refreshStats);
  $("resetStatsBtn").addEventListener("click", resetStats);
  $("testBtn").addEventListener("click", test);

  refreshUsage();
  if (LS.a) connect();
})();
</script>
</body>
</html>
